<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap"
        rel="stylesheet" />
    <title>Infinity Loop</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Loop</h1>
    </header>

    <div class="canvas-wrap">
        <canvas id="c"></canvas>
        <div class="watermark">Loop ➰</div>
    </div>

    <div class="controls">
        <div class="slider-row">
            <label>Arms</label>
            <input type="range" id="arms" min="2" max="8" step="1" value="4">
            <span id="arms-v">4</span>
        </div>
        <div class="slider-row">
            <label>Ratio</label>
            <input type="range" id="ratio" min="2" max="11" step="1" value="3">
            <span id="ratio-v">3</span>
        </div>
        <div class="slider-row">
            <label>Speed</label>
            <input type="range" id="spd" min="1" max="12" step="1" value="4">
            <span id="spd-v">4</span>
        </div>
        <div class="slider-row">
            <label>Trail</label>
            <input type="range" id="trail" min="100" max="1200" step="50" value="700">
            <span id="trail-v">700</span>
        </div>
        <div class="divider"></div>
        <div class="btn-row">
            <button id="btn-t1" class="active">Neon</button>
            <button id="btn-t2">Ember</button>
            <button id="btn-t3">Ocean</button>
            <button id="btn-t4">Candy</button>
            <button id="btn-clear">Clear</button>
            <button id="btn-pause">⏸ Pause</button>
        </div>
    </div>

    <footer>Drag sliders · Change theme · Watch loops emerge</footer>
    <script src="script.js"></script>
</body>

</html>
